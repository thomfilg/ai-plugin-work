name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    name: Test (Node ${{ matrix.node-version }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # Note: npm cache disabled — no package-lock.json in repo

      - name: Install dependencies
        run: npm install --ignore-scripts # npm install (not ci) — no lockfile in repo

      - name: Run tests
        run: npm test

  # NOTE: maintainers must add this job to the branch protection "Required checks"
  # list so failing quality gates block merges (R9 / AC9 / AC10).
  quality:
    runs-on: ubuntu-latest
    name: Quality (static code gate)
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Run static code quality gate
        run: pnpm quality
